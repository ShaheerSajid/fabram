# 6-Transistor SRAM bitcell (sky130A)
#
# Topology:
#   X0, X1  — pull-down NMOS cross-coupled pair (W=0.80)
#   X2, X3  — pull-up  PMOS cross-coupled pair  (W=0.42)
#   X4, X5  — access   NMOS pass transistors    (W=0.60)
#
# Ports:
#   VDD, VSS — supply rails
#   WL       — word line  (active high)
#   BL, BL_  — bit line and complement

cell:
  name: BIT_CELL
  ports: [VDD, VSS, WL, BL, BL_]
  components:
    - id: X0
      type: primitive
      model: nmos
      connections: {D: Q, G: Q_, S: VSS, B: VSS}
      parameters: {W: "0.80", L: "0.15", model_name: nmos_1v8}

    - id: X1
      type: primitive
      model: nmos
      connections: {D: Q_, G: Q, S: VSS, B: VSS}
      parameters: {W: "0.80", L: "0.15", model_name: nmos_1v8}

    - id: X2
      type: primitive
      model: pmos
      connections: {D: Q, G: Q_, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    - id: X3
      type: primitive
      model: pmos
      connections: {D: Q_, G: Q, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    - id: X4
      type: primitive
      model: nmos
      connections: {D: Q, G: WL, S: BL, B: VSS}
      parameters: {W: "0.60", L: "0.15", model_name: nmos_1v8}

    - id: X5
      type: primitive
      model: nmos
      connections: {D: Q_, G: WL, S: BL_, B: VSS}
      parameters: {W: "0.60", L: "0.15", model_name: nmos_1v8}
