# Master-Slave D Flip-Flop (sky130A) — 20 transistors
#
# A full master-slave register built from transmission gates and
# cross-coupled inverters.  D connects directly to the master TG (no
# input buffer), which gives a positive hold time of ~1 inverter delay
# (~50 ps TT) because the CLK→master_TG path is one inverter deep while
# D→master_TG requires no buffering.
#
# All transistors W=0.42um, L=0.15um.
#
# Ports:
#   VDD, VSS — supply rails
#   clk      — clock input
#   D        — data input
#   Q        — data output
#
# Internal nets:
#   net3  = ~clk          (clock complement, one inverter from clk)
#   net2  = clk           (clock, two inverters from clk — used for PMOS TG gate)
#   net1  = master storage node  (D when CLK=low; held by feedback when CLK=high)
#   net4  = ~net1         (master inverter output)
#   net11 = ~net4 = net1  (master feedback inverter output)
#   net5  = slave storage node   (net4 when CLK=high; held by feedback when CLK=low)
#   net55 = ~Q = net5     (slave feedback inverter output)

cell:
  name: MS_REG
  ports: [VDD, VSS, clk, D, Q]
  components:
    # ── Clock buffer / complement ──────────────────────────────────────────
    - id: X0
      type: primitive
      model: nmos
      connections: {D: net3, G: clk, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X8
      type: primitive
      model: pmos
      connections: {D: net3, G: clk, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    - id: X3
      type: primitive
      model: nmos
      connections: {D: net2, G: net3, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X11
      type: primitive
      model: pmos
      connections: {D: net2, G: net3, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    # ── Master input transmission gate (ON when CLK=low) ─────────────────
    # D connects directly — no input buffer.
    # NMOS gate = net3 (~clk): turns OFF 1 inverter delay after clk rises.
    # PMOS gate = net2 ( clk): turns OFF 2 inverter delays after clk rises.
    # ⟹ hold time ≈ +1 inverter delay from external CLK edge.
    - id: X5
      type: primitive
      model: nmos
      connections: {D: D, G: net3, S: net1, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X10
      type: primitive
      model: pmos
      connections: {D: D, G: net2, S: net1, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    # ── Master inverter: net1 → net4 ─────────────────────────────────────
    - id: X7
      type: primitive
      model: nmos
      connections: {D: net4, G: net1, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X14
      type: primitive
      model: pmos
      connections: {D: net4, G: net1, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    # ── Master feedback inverter: net4 → net11 ───────────────────────────
    - id: X6
      type: primitive
      model: nmos
      connections: {D: net11, G: net4, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X12
      type: primitive
      model: pmos
      connections: {D: net11, G: net4, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    # ── Master feedback TG: net11 → net1 (ON when CLK=high) ──────────────
    - id: X16
      type: primitive
      model: nmos
      connections: {D: net11, G: net2, S: net1, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X17
      type: primitive
      model: pmos
      connections: {D: net11, G: net3, S: net1, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    # ── Slave input transmission gate: net4 → net5 (ON when CLK=high) ───
    - id: X1
      type: primitive
      model: nmos
      connections: {D: net4, G: net2, S: net5, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X15
      type: primitive
      model: pmos
      connections: {D: net4, G: net3, S: net5, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    # ── Slave output buffer: net5 → Q ────────────────────────────────────
    - id: X4
      type: primitive
      model: nmos
      connections: {D: Q, G: net5, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X9
      type: primitive
      model: pmos
      connections: {D: Q, G: net5, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    # ── Slave feedback inverter: Q → net55 ───────────────────────────────
    - id: X2
      type: primitive
      model: nmos
      connections: {D: net55, G: Q, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X13
      type: primitive
      model: pmos
      connections: {D: net55, G: Q, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    # ── Slave feedback TG: net55 → net5 (ON when CLK=low) ────────────────
    - id: X18
      type: primitive
      model: nmos
      connections: {D: net55, G: net3, S: net5, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X19
      type: primitive
      model: pmos
      connections: {D: net55, G: net2, S: net5, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}
