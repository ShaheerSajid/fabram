# Write driver cell (sky130A)
#
# Generates differential write-data signals DW and DW_ from a single
# data input Din, gated by WREN.
#
# Internal signals:
#   en_  — NOT(WREN)  (WREN complement)
#   d_   — NOT(Din)   (Din complement)
#
# DW_  path (X6–X9):  PMOS pull-up (Din, en_ gated) + NMOS pull-down (WREN, Din gated)
# DW   path (X10–X13): PMOS pull-up (d_, en_ gated) + NMOS pull-down (WREN, d_ gated)
#
# Ports:
#   VDD, VSS — supply rails
#   WREN     — write enable (active high)
#   Din      — write data input
#   DW, DW_  — differential write-data outputs

cell:
  name: WRITE_DRIVER
  ports: [VDD, VSS, WREN, Din, DW, DW_]
  components:
    # WREN complement: en_ = NOT(WREN)
    - id: X0
      type: primitive
      model: pmos
      connections: {D: en_, G: WREN, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    - id: X1
      type: primitive
      model: nmos
      connections: {D: en_, G: WREN, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    # Din complement: d_ = NOT(Din)
    - id: X4
      type: primitive
      model: pmos
      connections: {D: d_, G: Din, S: VDD, B: VDD}
      parameters: {W: "0.42", L: "0.15", model_name: pmos_1v8}

    - id: X5
      type: primitive
      model: nmos
      connections: {D: d_, G: Din, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    # DW_ pull-up path: PMOS stack (Din → net1 → DW_ when en_ low)
    - id: X6
      type: primitive
      model: pmos
      connections: {D: net1, G: Din, S: VDD, B: VDD}
      parameters: {W: "2", L: "0.15", model_name: pmos_1v8}

    - id: X7
      type: primitive
      model: pmos
      connections: {D: DW_, G: en_, S: net1, B: VDD}
      parameters: {W: "2", L: "0.15", model_name: pmos_1v8}

    # DW_ pull-down path: NMOS stack (WREN & Din → DW_ low)
    - id: X8
      type: primitive
      model: nmos
      connections: {D: DW_, G: WREN, S: net2, B: VSS}
      parameters: {W: "1", L: "0.15", model_name: nmos_1v8}

    - id: X9
      type: primitive
      model: nmos
      connections: {D: net2, G: Din, S: VSS, B: VSS}
      parameters: {W: "1", L: "0.15", model_name: nmos_1v8}

    # DW pull-up path: PMOS stack (d_ → net3 → DW when en_ low)
    - id: X10
      type: primitive
      model: pmos
      connections: {D: net3, G: d_, S: VDD, B: VDD}
      parameters: {W: "2", L: "0.15", model_name: pmos_1v8}

    - id: X11
      type: primitive
      model: pmos
      connections: {D: DW, G: en_, S: net3, B: VDD}
      parameters: {W: "2", L: "0.15", model_name: pmos_1v8}

    # DW pull-down path: NMOS stack (WREN & d_ → DW low)
    - id: X12
      type: primitive
      model: nmos
      connections: {D: DW, G: WREN, S: net4, B: VSS}
      parameters: {W: "1", L: "0.15", model_name: nmos_1v8}

    - id: X13
      type: primitive
      model: nmos
      connections: {D: net4, G: d_, S: VSS, B: VSS}
      parameters: {W: "1", L: "0.15", model_name: nmos_1v8}
