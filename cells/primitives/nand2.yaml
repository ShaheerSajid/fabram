    - id: X2
      type: primitive
      model: nmos
      connections: {D: Y, G: B, S: net1, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}

    - id: X3
      type: primitive
      model: nmos
      connections: {D: net1, G: A, S: VSS, B: VSS}
      parameters: {W: "0.42", L: "0.15", model_name: nmos_1v8}
